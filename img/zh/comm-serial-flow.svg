<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 130">
  <defs>
    <marker id="aR" markerWidth="10" markerHeight="7" refX="10" refY="3.5">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#7c3aed"/>
    </marker>
    <marker id="aL" markerWidth="10" markerHeight="7" refX="0" refY="3.5">
      <path d="M10,0 L0,3.5 L10,7 Z" fill="#7c3aed"/>
    </marker>
  </defs>
  <!-- Host box -->
  <rect x="10" y="10" width="230" height="110" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="125" y="38" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#5b21b6">主机 (Klippy)</text>
  <text x="125" y="58" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b5cf6">Python + CFFI</text>
  <text x="125" y="76" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">serialhdl.py</text>
  <text x="125" y="94" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">msgproto.py</text>
  <!-- MCU box -->
  <rect x="400" y="10" width="230" height="110" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="515" y="38" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#92400e">MCU（微控制器）</text>
  <text x="515" y="58" text-anchor="middle" font-family="monospace" font-size="11" fill="#b45309">C 固件</text>
  <text x="515" y="76" text-anchor="middle" font-family="monospace" font-size="10" fill="#d97706">command.c</text>
  <text x="515" y="94" text-anchor="middle" font-family="monospace" font-size="10" fill="#d97706">serial_irq.c</text>
  <!-- Host → MCU (top, left-to-right) -->
  <line x1="240" y1="42" x2="394" y2="42" stroke="#7c3aed" stroke-width="2" marker-end="url(#aR)"/>
  <text x="317" y="34" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#7c3aed">串口 / CAN / USB</text>
  <text x="317" y="47" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a78bfa">&gt;&gt; 命令 (VLQ 编码) &gt;&gt;</text>
  <!-- MCU → Host (bottom, right-to-left) -->
  <line x1="400" y1="86" x2="246" y2="86" stroke="#7c3aed" stroke-width="2" marker-end="url(#aL)"/>
  <text x="317" y="104" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a78bfa">&lt;&lt; 响应 + ACK/NAK &lt;&lt;</text>
</svg>

# This file contains an example configuration for a 74HC595 shift
# register used as an output expander.  The snippets in this file
# may be copied into the main printer.cfg file and customized.
#
# See docs/Config_Reference.md for a description of parameters.

# The 74HC595 is a serial-to-parallel shift register that provides
# 8 additional digital output pins using just 3 MCU pins (Data,
# Clock, Latch).  Multiple chips can be daisy-chained for more
# outputs.
#
# Wiring:
#   74HC595 pin 14 (SER/Data)   -> MCU data_pin
#   74HC595 pin 11 (SRCLK/Clock) -> MCU clock_pin
#   74HC595 pin 12 (RCLK/Latch)  -> MCU latch_pin
#   74HC595 pin 13 (OE)         -> MCU GND (optional: MCU pin)
#   74HC595 pin 10 (SRCLR)      -> MCU VCC
#   74HC595 pin 8  (GND)        -> GND
#   74HC595 pin 16 (VCC)        -> +3.3V or +5V
#
# For daisy-chaining, connect Q7' (pin 9) of first chip to SER
# (pin 14) of next chip. All chips share CLOCK, LATCH, and OE.

# Basic single 74HC595 configuration
[hc595 my_shift]
data_pin:   PA1   # Connects to 74HC595 pin 14 (SER)
clock_pin:  PA2   # Connects to 74HC595 pin 11 (SRCLK)
latch_pin:  PA3   # Connects to 74HC595 pin 12 (RCLK)
#oe_pin:    !PA4  # Optional: Connects to 74HC595 pin 13 (OE)
#chain_count: 1   # Number of daisy-chained 74HC595 chips

# Use the HC595 outputs like regular pins via the chip name prefix.
# Pin numbers are 0-7 for a single chip, 0-15 for two chips, etc.
#
# Example: Using HC595 output 0 to control a fan
#[fan]
#pin: my_shift:0

# Example: Using HC595 output 3 to control a heater
#[heater_generic my_heater]
#heater_pin: my_shift:3
#max_power: 1.0

# Example: Using HC595 output 7 for a generic output pin
#[output_pin my_output]
#pin: my_shift:7
#value: 0
#shutdown_value: 0

# Debug G-Code command to inspect or set all HC595 pins at once:
#   SET_HC595 CHIP=my_shift            # Read current state
#   SET_HC595 CHIP=my_shift BITS=0xFF  # Set all pins high

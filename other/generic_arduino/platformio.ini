;
; platformio.ini - Kalico generic_arduino project configuration
;
; Supported boards:
;   - Arduino Mega 2560 (default)
;   - Arduino Uno
;   - Arduino Due
;   - Teensy 4.0
;   - ESP32 DevKit
;
; To build for a specific board, uncomment the appropriate [env:*] section
; and run: pio run -e <env_name>
;

[platformio]
default_envs = mega2560
;default_envs = uno
;default_envs = due
;default_envs = teensy40
;default_envs = esp32dev

; ============================================================================
; Common settings for all environments
; ============================================================================

[common]
; Include paths so that "board/xxx.h" → src/arduino/ or src/board/
; and "generic/xxx.h" → src/generic/
build_flags_common =
    -Isrc
    -Isrc/board
    -Isrc/arduino
    -Isrc/generic
    -Isrc/lib/KalicoProtocol/src
    -DCONFIG_MACH_ARDUINO=1
    -DCONFIG_BOARD_DIRECTORY="\"arduino\""

; Core source files to compile (all .c and .cpp under src/)
; Exclude nothing by default — all platform-appropriate files will be compiled
build_src_filter_common =
    +<*>
    -<.git/>
    -<.svn/>

; Library dependencies
lib_deps_common =
    ; KalicoProtocol is included locally via lib_extra_dirs

lib_extra_dirs_common =
    ../library

; ============================================================================
; Arduino Mega 2560 (ATmega2560, 16 MHz)
; ============================================================================

[env:mega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
build_flags =
    ${common.build_flags_common}
    -DCONFIG_MACH_AVR=1
    -DCONFIG_CLOCK_FREQ=16000000UL
    -DCONFIG_SERIAL_BAUD=250000
    -DCONFIG_AVR_STACK_SIZE=256
build_src_filter =
    ${common.build_src_filter_common}
lib_deps =
    ${common.lib_deps_common}
lib_extra_dirs =
    ${common.lib_extra_dirs_common}
monitor_speed = 115200

; ============================================================================
; Arduino Uno (ATmega328P, 16 MHz)
; ============================================================================

[env:uno]
platform = atmelavr
board = uno
framework = arduino
build_flags =
    ${common.build_flags_common}
    -DCONFIG_MACH_AVR=1
    -DCONFIG_CLOCK_FREQ=16000000UL
    -DCONFIG_SERIAL_BAUD=250000
    -DCONFIG_AVR_STACK_SIZE=128
build_src_filter =
    ${common.build_src_filter_common}
lib_deps =
    ${common.lib_deps_common}
lib_extra_dirs =
    ${common.lib_extra_dirs_common}
monitor_speed = 115200

; ============================================================================
; Arduino Due (ATSAM3X8E, 84 MHz, ARM Cortex-M3)
; ============================================================================

[env:due]
platform = atmelsam
board = due
framework = arduino
build_flags =
    ${common.build_flags_common}
    -DCONFIG_CLOCK_FREQ=84000000UL
    -DCONFIG_SERIAL_BAUD=250000
    -DCONFIG_AVR_STACK_SIZE=1024
build_src_filter =
    ${common.build_src_filter_common}
lib_deps =
    ${common.lib_deps_common}
lib_extra_dirs =
    ${common.lib_extra_dirs_common}
monitor_speed = 115200

; ============================================================================
; Teensy 4.0 (ARM Cortex-M7, 600 MHz)
; ============================================================================

[env:teensy40]
platform = teensy
board = teensy40
framework = arduino
build_flags =
    ${common.build_flags_common}
    -DCONFIG_CLOCK_FREQ=600000000UL
    -DCONFIG_SERIAL_BAUD=250000
    -DCONFIG_AVR_STACK_SIZE=4096
build_src_filter =
    ${common.build_src_filter_common}
lib_deps =
    ${common.lib_deps_common}
lib_extra_dirs =
    ${common.lib_extra_dirs_common}
monitor_speed = 115200

; ============================================================================
; ESP32 DevKit (Tensilica Xtensa LX6, 240 MHz)
; ============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    ${common.build_flags_common}
    -DCONFIG_CLOCK_FREQ=240000000UL
    -DCONFIG_SERIAL_BAUD=250000
    -DCONFIG_AVR_STACK_SIZE=4096
build_src_filter =
    ${common.build_src_filter_common}
lib_deps =
    ${common.lib_deps_common}
lib_extra_dirs =
    ${common.lib_extra_dirs_common}
monitor_speed = 115200
